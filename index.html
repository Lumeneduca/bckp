<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gerador de Planejamento - Didatta</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pizzip/3.1.4/pizzip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.37.11/docxtemplater.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<style>
:root{
    --primary:#3754DB;
    --primary-hover:#2440bc;
    --bg:#F4F7FF;
    --card:#FFFFFF;
    --text:#172033;
    --light:#64748B;
    --border:#E2E8F0;
    --success:#10b981;
}

*{ margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }

body{
    background:linear-gradient(180deg,#F6F8FF 0%,#EEF3FF 100%);
    min-height:100vh;
    padding:20px;
    color:var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
}

.container{
    background:var(--card);
    border-radius:32px;
    padding:40px;
    width: 100%;
    max-width: 800px;
    box-shadow:0 20px 50px rgba(15,23,42,.08);
}

.header {
    text-align: center;
    margin-bottom: 30px;
}

.logo-icon{
    width:56px;
    height:56px;
    border-radius:16px;
    background:linear-gradient(135deg,#4F8AFA 0%,#3754DB 100%);
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 10px 25px rgba(55,84,219,.25);
    margin: 0 auto 15px auto;
}

.title {
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: -1px;
    color: var(--text);
}

.title span { color: var(--primary); }

.subtitle {
    color: var(--light);
    font-weight: 500;
    margin-top: 5px;
}

.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 30px;
}

.input-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.input-group.full-width {
    grid-column: span 2;
}

label {
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--text);
}

input {
    width: 100%;
    background: #F8FAFF;
    border: 2px solid #E6ECFF;
    border-radius: 14px;
    padding: 16px;
    font-size: 1rem;
    color: var(--text);
    transition: all .3s ease;
    outline: none;
}

input:focus {
    border-color: var(--primary);
    background: white;
    box-shadow: 0 0 0 4px rgba(55, 84, 219, 0.15);
}

.btn-generate {
    width: 100%;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #3754DB 0%, #5D78FF 100%);
    color: white;
    padding: 20px;
    font-size: 1.15rem;
    font-weight: 800;
    cursor: pointer;
    transition: all .3s ease;
    box-shadow: 0 12px 28px rgba(55,84,219,.3);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
}

.btn-generate:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 35px rgba(55,84,219,.4);
}

.btn-generate:disabled {
    opacity: 0.7;
    cursor: not-allowed;
    transform: none;
}

.status-message {
    text-align: center;
    margin-top: 15px;
    font-weight: 600;
    font-size: 0.95rem;
    min-height: 20px;
}

.status-success { color: var(--success); }
.status-error { color: var(--danger); }

@media(max-width: 768px) {
    .form-grid { grid-template-columns: 1fr; }
    .input-group.full-width { grid-column: span 1; }
    .container { padding: 24px; }
}
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo-icon">
            <svg width="24" height="26" viewBox="0 0 16 22" fill="white">
                <path d="M2 2C2 0.895431 2.89543 0 4 0H12C13.1046 0 14 0.895431 14 2V21.5L8 18L2 21.5V2Z"/>
            </svg>
        </div>
        <div class="title">Gerador de <span>Planejamento</span></div>
        <div class="subtitle">Preencha os dados e baixe o Word formatado automaticamente</div>
    </div>

    <div class="form-grid">
        <div class="input-group full-width">
            <label>Escola</label>
            <input type="text" id="escola" placeholder="Ex: Escola Municipal José Rodrigues Maia">
        </div>
        
        <div class="input-group">
            <label>Professor(a)</label>
            <input type="text" id="professor" placeholder="Ex: Victor Manoel">
        </div>

        <div class="input-group">
            <label>Turma</label>
            <input type="text" id="turma" placeholder="Ex: 1º ANO">
        </div>

        <div class="input-group">
            <label>Data (Segunda-feira)</label>
            <input type="text" id="data_segunda" placeholder="Ex: 04/05/2036">
        </div>

        <div class="input-group">
            <label>Dia Letivo</label>
            <input type="text" id="dia_letivo" placeholder="Ex: 53">
        </div>
    </div>

    <button class="btn-generate" id="btnGerar" onclick="gerarDocumento()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        Gerar e Baixar Documento
    </button>

    <div id="statusMessage" class="status-message"></div>
</div>

<script>
// --- ATENÇÃO: COLOQUE O LINK RAW DO SEU ARQUIVO DO GITHUB AQUI ---
const githubRawUrl = "https://raw.githubusercontent.com/Lumeneduca/bckp/main/Modelo.docx"; 

async function gerarDocumento() {
    const btnGerar = document.getElementById('btnGerar');
    const statusMessage = document.getElementById('statusMessage');
    
    btnGerar.disabled = true;
    btnGerar.innerHTML = "Gerando arquivo...";
    statusMessage.className = "status-message";
    statusMessage.innerText = "";

    try {
        // 1. Faz o download do arquivo modelo do Github na memória RAM
        const response = await fetch(githubRawUrl);
        if (!response.ok) throw new Error("Erro ao baixar o modelo do GitHub. Verifique o link.");
        
        const arrayBuffer = await response.arrayBuffer();

        // 2. Lê a estrutura do arquivo ZIP (O formato .docx é um arquivo zipado)
        const zip = new PizZip(arrayBuffer);

        // 3. Inicializa o renderizador de template
        const doc = new window.docxtemplater(zip, {
            paragraphLoop: true,
            linebreaks: true,
        });

        // 4. Mapeia os dados preenchidos no site para o documento
        const dadosFormulario = {
            escola: document.getElementById('escola').value,
            professor: document.getElementById('professor').value,
            turma: document.getElementById('turma').value,
            data_segunda: document.getElementById('data_segunda').value,
            dia_letivo: document.getElementById('dia_letivo').value
        };

        // 5. Substitui as tags {{ }} pelos dados do formulário
        doc.render(dadosFormulario);

        // 6. Gera o novo arquivo editado
        const out = doc.getZip().generate({
            type: "blob",
            mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
        });

        // 7. Força o download e o arquivo é apagado da RAM em seguida
        saveAs(out, "Planejamento_Semanal_Editado.docx");

        statusMessage.className = "status-message status-success";
        statusMessage.innerText = "Download concluído com sucesso!";
        
    } catch (error) {
        console.error(error);
        statusMessage.className = "status-message status-error";
        statusMessage.innerText = "Falha ao gerar o documento. Verifique a URL do GitHub e o console.";
    } finally {
        // Restaura o botão
        btnGerar.disabled = false;
        btnGerar.innerHTML = `
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            Gerar e Baixar Documento
        `;
    }
}
</script>

</body>
</html>
