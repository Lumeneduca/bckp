<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerador DOCX</title>

<script src="https://unpkg.com/pizzip@3.1.6/dist/pizzip.min.js"></script>
<script src="https://unpkg.com/docxtemplater@3.42.7/build/docxtemplater.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<style>
body{
    font-family:Arial;
    padding:30px;
    background:#f5f5f5;
}

input{
    width:300px;
    padding:10px;
    margin:10px 0;
}

button{
    padding:12px 20px;
    cursor:pointer;
}
</style>
</head>

<body>

<h2>Gerador de Documento</h2>

<input id="professor" placeholder="Professor"><br>
<input id="turma" placeholder="Turma"><br>
<input id="data" placeholder="Data"><br>

<button onclick="gerar()">Gerar Word</button>

<script>

async function gerar(){

    const url = "https://raw.githubusercontent.com/Lumeneduca/bckp/main/Modelo.docx";

    const response = await fetch(url);

    const content = await response.arrayBuffer();

    const zip = new PizZip(content);

    const doc = new window.docxtemplater(zip,{
        paragraphLoop:true,
        linebreaks:true
    });

    doc.render({
        professor:document.getElementById("professor").value,
        turma:document.getElementById("turma").value,
        data:document.getElementById("data").value
    });

    const blob = doc.getZip().generate({
        type:"blob",
        mimeType:"application/vnd.openxmlformats-officedocument.wordprocessingml.document"
    });

    saveAs(blob,"documento.docx");

}

</script>

</body>
</html>
